name: CI

# Build + test the StellarWork contracts and frontend on every push / PR.
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  contracts:
    name: Soroban contracts (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # soroban-sdk 25 requires the wasm32v1-none target (Rust 1.84+).
          targets: wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: cargo-${{ runner.os }}-${{ hashFiles('contracts/**/Cargo.toml') }}

      - name: Unit + integration tests
        run: cargo test --workspace

      - name: Build contracts to wasm
        run: cargo build --release --target wasm32v1-none -p reputation -p escrow

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
